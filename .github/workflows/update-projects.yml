name: Update project metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */12 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh GitHub project metadata
        run: node scripts/update-projects.mjs
        env:
          GH_PROJECTS_TOKEN: ${{ secrets.GH_PROJECTS_TOKEN || github.token }}

      - name: Commit metadata changes
        run: |
          if git diff --quiet -- projects-data.json; then
            echo "No project metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects-data.json
          git commit -m "Update project metadata"
          git push
