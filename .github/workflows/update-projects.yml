name: Update GitHub metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # 1:00 AM ET (EST, UTC-5); not DST-adjusted

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh GitHub metadata
        run: |
          node scripts/update-projects.mjs
          node scripts/update-github-heatmap.mjs
        env:
          GH_PROJECTS_TOKEN: ${{ secrets.GH_PROJECTS_TOKEN || github.token }}
          GH_HEATMAP_TOKEN: ${{ secrets.GH_HEATMAP_TOKEN || secrets.GH_PROJECTS_TOKEN || github.token }}

      - name: Commit metadata changes
        run: |
          if git diff --quiet -- projects-data.json github-activity.json projects.html; then
            echo "No GitHub metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects-data.json github-activity.json projects.html
          git commit -m "Update GitHub metadata"
          git push
